name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package distribution
        run: uv build

      - name: Build release notes from CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION="${TAG_NAME#v}"

          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["TAG_NAME"].lstrip("v")
          changelog = pathlib.Path("CHANGELOG.md")
          out = pathlib.Path("release-notes.md")

          if not changelog.exists():
              out.write_text(
                  f"Release {version}\n\nSee repository history for details.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          text = changelog.read_text(encoding="utf-8")

          pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*?$\n(.*?)(?=^## \[|\Z)",
              re.M | re.S,
          )
          match = pattern.search(text)

          if not match:
              out.write_text(
                  (
                      f"Release {version}\n\n"
                      "No matching changelog section was found. "
                      "Please update CHANGELOG.md.\n"
                  ),
                  encoding="utf-8",
              )
              raise SystemExit(0)

          notes = match.group(1).strip()
          out.write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false

  publish-pypi:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
