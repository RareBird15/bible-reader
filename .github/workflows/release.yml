name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Verify tag version matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["TAG_NAME"].lstrip("v")
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.M)
          if not match:
              print("ERROR: Could not find version in pyproject.toml", file=sys.stderr)
              raise SystemExit(1)
          pkg_version = match.group(1)
          if tag != pkg_version:
              print(
                  f"ERROR: Tag '{tag}' does not match package version '{pkg_version}'",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(f"Version check passed: {pkg_version}")
          PY

      - name: Build package distribution
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build release notes from CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["TAG_NAME"].lstrip("v")
          changelog = pathlib.Path("CHANGELOG.md")
          out = pathlib.Path("release-notes.md")

          if not changelog.exists():
              out.write_text(
                  f"Release {version}\n\nSee repository history for details.\n",
                  encoding="utf-8",
              )
              raise SystemExit(1)

          text = changelog.read_text(encoding="utf-8")

          pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*?$\n(.*?)(?=^## \[|\Z)",
              re.M | re.S,
          )
          match = pattern.search(text)

          if not match:
              out.write_text(
                  (
                      f"Release {version}\n\n"
                      "No matching changelog section was found. "
                      "Please update CHANGELOG.md.\n"
                  ),
                  encoding="utf-8",
              )
              raise SystemExit(1)

          notes = match.group(1).strip()
          out.write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false

  publish-pypi:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
